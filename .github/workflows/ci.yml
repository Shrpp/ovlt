name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ovlt
          POSTGRES_PASSWORD: ovlt
          POSTGRES_DB: ovlt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://ovlt:ovlt@localhost:5432/ovlt_test
      JWT_SECRET: test-jwt-secret-that-is-at-least-32-chars
      MASTER_ENCRYPTION_KEY: test-master-key-that-is-32-chars!!
      TENANT_WRAP_KEY: test-wrap-key-different-32-chars!!
      OVLT_ADMIN_KEY: test-admin-key
      OVLT_ISSUER: http://localhost:3000
      ENVIRONMENT: development

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Migrate
        run: cargo run --bin migration -- up

      - name: Test
        run: cargo test --package ovlt-core -- --test-threads=1
