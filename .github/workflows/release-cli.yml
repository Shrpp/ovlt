name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: ovlt-linux-x64
            cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_name: ovlt-linux-arm64
            cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: ovlt-macos-x64
            cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: ovlt-macos-arm64
            cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: ovlt-windows-x64.exe
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (ARM)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --bin ovlt --target ${{ matrix.target }}
          else
            cargo build --release --bin ovlt --target ${{ matrix.target }}
          fi

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/ovlt"
          tag="${{ github.ref_name }}"
          name="${{ matrix.asset_name }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            final="${name%.exe}-${tag}.exe"
            cp "${src}.exe" "$final"
          else
            final="${name}-${tag}"
            cp "$src" "$final"
          fi
          echo "ASSET=$final" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ env.ASSET }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
